<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migration Orchestrator</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
      --yellow: #eab308;
      --gray: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge-idle { background: var(--gray); color: #fff; }
    .badge-running { background: var(--accent); color: #fff; animation: pulse 1.5s infinite; }
    .badge-paused { background: var(--orange); color: #fff; }
    .badge-stopped { background: var(--red); color: #fff; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }

    button, .btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #243044; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: #2563eb; }
    button.danger { border-color: var(--red); color: var(--red); }
    button.small { padding: 0.25rem 0.5rem; font-size: 0.75rem; }

    #csv-input { display: none; }

    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    .stat-card .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; }
    .stat-card .value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }
    .stat-card.done .value { color: var(--green); }
    .stat-card.failed .value { color: var(--red); }
    .stat-card.pending .value { color: var(--gray); }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th { color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .status-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-pending { background: #374151; color: #d1d5db; }
    .status-running { background: #1e3a5f; color: #93c5fd; animation: pulse 1.5s infinite; }
    .status-done { background: #14532d; color: #86efac; }
    .status-pre-failed, .status-conv-failed, .status-post-failed { background: #450a0a; color: #fca5a5; }
    .status-rolled-back { background: #431407; color: #fdba74; }
    .status-excluded { background: #422006; color: #fde047; }

    .actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      z-index: 200;
      max-width: 400px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: var(--red); color: #fca5a5; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: min(800px, 100%);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-body {
      padding: 1rem 1.25rem;
      overflow-y: auto;
      flex: 1;
    }

    #log-content {
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      background: var(--bg);
      padding: 1rem;
      border-radius: 6px;
      max-height: 50vh;
      overflow-y: auto;
    }

    .empty { text-align: center; color: var(--muted); padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>Migration Orchestrator</h1>
    <div class="header-right">
      <span id="orch-status" class="badge badge-idle">idle</span>
      <input type="file" id="csv-input" accept=".csv">
      <button id="btn-import">Import CSV</button>
      <button id="btn-start" class="primary">Start</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-stop" class="danger">Stop</button>
    </div>
  </header>

  <main>
    <div class="stats">
      <div class="stat-card">
        <div class="label">Total VMs</div>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-card done">
        <div class="label">Done</div>
        <div class="value" id="stat-done">0</div>
      </div>
      <div class="stat-card failed">
        <div class="label">Failed</div>
        <div class="value" id="stat-failed">0</div>
      </div>
      <div class="stat-card pending">
        <div class="label">Pending</div>
        <div class="value" id="stat-pending">0</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>VM Name</th>
            <th>OS</th>
            <th>Source</th>
            <th>Target</th>
            <th>Status</th>
            <th>Current Step</th>
            <th>Duration</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="vm-table-body">
          <tr><td colspan="8" class="empty">No VMs loaded. Import a CSV to begin.</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <div id="log-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="log-modal-title">VM Logs</h2>
        <button id="log-modal-close">Close</button>
      </div>
      <div class="modal-body">
        <pre id="log-content">Loading...</pre>
      </div>
    </div>
  </div>

  <script>
    const FAILED_STATUSES = new Set(['pre-failed', 'conv-failed', 'post-failed', 'rolled-back']);

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    async function api(method, path, body) {
      const opts = { method, headers: {} };
      if (body instanceof FormData) {
        opts.body = body;
      } else if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const res = await fetch(path, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || res.statusText);
      return data;
    }

    function formatDuration(seconds) {
      if (!seconds && seconds !== 0) return '—';
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m > 0 ? `${m}m ${s}s` : `${s}s`;
    }

    function statusBadge(status) {
      const cls = 'status-badge status-' + (status || 'pending').replace(/\s/g, '-');
      return `<span class="${cls}">${status || 'pending'}</span>`;
    }

    function renderVMs(vms) {
      const tbody = document.getElementById('vm-table-body');
      if (!vms.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">No VMs loaded. Import a CSV to begin.</td></tr>';
        return;
      }

      tbody.innerHTML = vms.map(vm => {
        let actions = `<button class="small" onclick="viewLogs('${esc(vm.vm_name)}')">View Logs</button>`;
        if (FAILED_STATUSES.has(vm.status)) {
          actions += ` <button class="small" onclick="retryVM('${esc(vm.vm_name)}')">Retry</button>`;
        }
        if (vm.status === 'excluded') {
          actions += ` <button class="small" onclick="approveVM('${esc(vm.vm_name)}')">Approve</button>`;
        }
        return `<tr>
          <td>${esc(vm.vm_name)}</td>
          <td>${esc(vm.os_version)}</td>
          <td>${esc(vm.source_host)}</td>
          <td>${esc(vm.target_host)}</td>
          <td>${statusBadge(vm.status)}</td>
          <td>${esc(vm.current_step || '—')}</td>
          <td>${formatDuration(vm.duration_seconds)}</td>
          <td class="actions">${actions}</td>
        </tr>`;
      }).join('');
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function updateOrchStatus(state) {
      const el = document.getElementById('orch-status');
      el.textContent = state;
      el.className = 'badge badge-' + state;
    }

    async function refresh() {
      try {
        const [vms, report, status] = await Promise.all([
          api('GET', '/api/vms'),
          api('GET', '/api/report'),
          api('GET', '/api/status'),
        ]);
        document.getElementById('stat-total').textContent = report.total;
        document.getElementById('stat-done').textContent = report.done;
        document.getElementById('stat-failed').textContent = report.failed;
        document.getElementById('stat-pending').textContent = report.pending;
        updateOrchStatus(status.state);
        renderVMs(vms);
      } catch (err) {
        console.error('Refresh failed:', err);
      }
    }

    document.getElementById('btn-import').addEventListener('click', () => {
      document.getElementById('csv-input').click();
    });

    document.getElementById('csv-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const form = new FormData();
      form.append('file', file);
      try {
        const result = await api('POST', '/api/import', form);
        showToast(`Imported ${result.imported} VM(s)`);
        await refresh();
      } catch (err) {
        showToast(err.message, true);
      }
      e.target.value = '';
    });

    document.getElementById('btn-start').addEventListener('click', async () => {
      try {
        await api('POST', '/api/start');
        showToast('Orchestrator started');
        await refresh();
      } catch (err) {
        showToast(err.message, true);
      }
    });

    document.getElementById('btn-pause').addEventListener('click', async () => {
      try {
        await api('POST', '/api/pause');
        showToast('Pause requested');
        await refresh();
      } catch (err) {
        showToast(err.message, true);
      }
    });

    document.getElementById('btn-stop').addEventListener('click', async () => {
      try {
        await api('POST', '/api/stop');
        showToast('Stop requested');
        await refresh();
      } catch (err) {
        showToast(err.message, true);
      }
    });

    async function viewLogs(vmName) {
      const modal = document.getElementById('log-modal');
      const content = document.getElementById('log-content');
      document.getElementById('log-modal-title').textContent = `Logs — ${vmName}`;
      content.textContent = 'Loading...';
      modal.classList.add('open');
      try {
        const vm = await api('GET', `/api/vms/${encodeURIComponent(vmName)}`);
        content.textContent = vm.logs || 'No logs for this VM yet.';
        content.scrollTop = content.scrollHeight;
      } catch (err) {
        content.textContent = 'Failed to load logs: ' + err.message;
      }
    }

    async function retryVM(vmName) {
      try {
        await api('POST', `/api/vm/${encodeURIComponent(vmName)}/retry`);
        showToast(`${vmName} queued for retry`);
        await refresh();
      } catch (err) {
        showToast(err.message, true);
      }
    }

    async function approveVM(vmName) {
      try {
        await api('POST', `/api/vm/${encodeURIComponent(vmName)}/approve`);
        showToast(`${vmName} approved`);
        await refresh();
      } catch (err) {
        showToast(err.message, true);
      }
    }

    document.getElementById('log-modal-close').addEventListener('click', () => {
      document.getElementById('log-modal').classList.remove('open');
    });

    document.getElementById('log-modal').addEventListener('click', (e) => {
      if (e.target.id === 'log-modal') {
        document.getElementById('log-modal').classList.remove('open');
      }
    });

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
